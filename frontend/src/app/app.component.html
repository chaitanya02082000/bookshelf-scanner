@if (auth.isLoading$ | async) {
  <div>Loading...</div>
} @else {
  @if ((auth.isAuthenticated$ | async) && (auth.user$ | async); as user) {
    <p>Logged in as {{ user.email }}</p>
    <h1>User Profile</h1>
    <pre>{{ user | json }}</pre>
    <button
      (click)="auth.logout({logoutParams: {returnTo: window.location.origin}})"
    >
      Logout
    </button>

    <router-outlet></router-outlet>
  } @else {
    @if (auth.error$ | async; as error) {
      <p>Error: {{ error.message }}</p>
    }

    <div>
      <button
        (click)="
          auth.loginWithRedirect({authorizationParams: {screen_hint: 'signup'}})
        "
      >
        Sign Up
      </button>
      <button (click)="auth.loginWithRedirect()">Log In</button>
    </div>
  }
}
