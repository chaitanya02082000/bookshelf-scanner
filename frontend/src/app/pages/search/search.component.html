<section class="search">
  <div class="search__header">
    <button type="button" class="search__trigger" (click)="openSearch()">
      <span class="search__trigger-icon">Search</span>
      <span class="search__trigger-value">
        @if (query()) {
          {{ query() }}
        } @else {
          Search by title, author, or ISBN
        }
      </span>
    </button>
  </div>

  <div class="search__results">
    @if (isSearching()) {
      <div class="search__status">
        <div class="search-loader-shell">
          <div [class]="loaderVariant()"></div>
        </div>
      </div>
    }

    @if (!isSearching() && results().length > 0) {
      <p class="search__count">{{ total() }} matches</p>
      <div class="search__grid">
        @for (book of results(); track book.id) {
          <article class="search-card">
            <div class="search-card__cover">
              @if (book.coverUrl) {
                <img [src]="book.coverUrl" [alt]="book.title" />
              } @else {
                <div class="search-card__placeholder">No cover</div>
              }
            </div>
            <div class="search-card__body">
              <h3>{{ book.title }}</h3>
              <p>{{ book.authors.join(", ") }}</p>
            </div>
            <button class="search-card__cta" (click)="addToLibrary(book)">
              Add to library
            </button>
          </article>
        }
      </div>
    }
  </div>

  @if (searchOpen()) {
    <div class="search-overlay" role="dialog" aria-modal="true">
      <button
        type="button"
        class="search-overlay__backdrop"
        (click)="closeSearch()"
        aria-label="Close search"
      ></button>

      <div class="search-overlay__panel">
        <form class="search-overlay__form" (ngSubmit)="runSearch()">
          <input
            #searchInput
            type="search"
            placeholder="Search by title, author, or ISBN"
            [ngModel]="query()"
            (ngModelChange)="query.set($event)"
            name="query"
            autofocus
          />
          <button type="submit">Search</button>
        </form>
      </div>
    </div>
  }
</section>
